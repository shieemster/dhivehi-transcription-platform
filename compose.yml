
services:

  minio:
    image: minio/minio:latest
    container_name: transcript_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  gradio_convert:
    build: ./gradio/convert
    container_name: transcript_gradio_convert
    restart: on-failure:5
    ports:
      - "7860:7860"
    depends_on:
      - minio
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"
    networks:
      - app_network

  gradio_diarization:
    build: ./gradio/diarization
    container_name: transcript_gradio_diarization
    command: [ "python", "-u", "diarization.py" ]
    restart: on-failure:5
    depends_on:
      - redis
      - qdrant
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: file_metadata
      HUGGINGFACE_ACCESS_TOKEN: ${HUGGINGFACE_ACCESS_TOKEN}
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"

    volumes:
      - ./gradio/diarization/outputs:/app/outputs
      - ./models/pyannote:/root/.cache/huggingface/hub
    networks:
      - app_network

  gradio_transcription:
    build: ./gradio/transcription
    container_name: transcript_gradio_transcription
    restart: on-failure:5
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
      - minio
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: file_metadata
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"
    volumes:
      - /data/911/911_whisper_model:/app/models
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: transcript_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: transcript_backend
    restart: unless-stopped
    ports:
      - "8000:8000" # expose backend to LAN
    environment:
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      QDRANT_HOST: "http://qdrant:6333"
    depends_on:
      - minio
    networks:
      - app_network

  dagster:
    image: python:3.10-slim
    container_name: transcript_dagster
    restart: on-failure:5
    working_dir: /opt/dagster
    ports:
      - "3070:3000" 
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
    volumes:
      - ./dagster:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    networks:
      - app_network
    depends_on:
      - redis
      - qdrant
    command: >
      sh -c " pip install dagster dagster-webserver dagster-postgres redis requests && dagster dev -h 0.0.0.0 -p 3000 -f /opt/dagster/app/definitions.py "

networks:
  app_network:
    driver: bridge

volumes:
  minio_data:
  qdrant_data:
  dagster_home:
