
services:

  postgres:
    image: postgres:16
    container_name: transcript_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: transcript_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: transcript_security
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcript_app -d transcript_security"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    container_name: transcript_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    # NOTE: no "ports:" mapping to the host on purpose. Qdrant has no
    # authentication of its own by default — it was previously published
    # on 6333/6334, which combined with the frontend querying it directly
    # meant anyone who could reach this machine could read (and delete)
    # every transcript with zero login required, bypassing RBAC entirely.
    # Backend, Dagster, and Gradio all reach it via the internal Docker
    # network hostname "qdrant:6333" and don't need the host mapping.
    # If you need to inspect Qdrant directly for debugging, use:
    #   docker compose exec backend curl http://qdrant:6333/collections
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  gradio_convert:
    build: ./gradio/convert
    container_name: transcript_gradio_convert
    restart: on-failure:5
    ports:
      - "7860:7860"
    depends_on:
      - minio
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"
    networks:
      - app_network

  gradio_diarization:
    build: ./gradio/diarization
    container_name: transcript_gradio_diarization
    command: [ "python", "-u", "diarization.py" ]
    restart: on-failure:5
    depends_on:
      - redis
      - qdrant
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: file_metadata
      HUGGINGFACE_ACCESS_TOKEN: ${HUGGINGFACE_ACCESS_TOKEN}
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"

    volumes:
      - ./gradio/diarization/outputs:/app/outputs
      - ./models/pyannote:/root/.cache/huggingface/hub
    networks:
      - app_network

  gradio_transcription:
    build: ./gradio/transcription
    container_name: transcript_gradio_transcription
    restart: on-failure:5
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
      - minio
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: file_metadata
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      DAGSTER_ENABLED: "true"
      DAGSTER_API_URL: "http://dagster:3000"
    volumes:
      - /data/911/911_whisper_model:/app/models
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: transcript_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: transcript_backend
    restart: unless-stopped
    ports:
      - "8000:8000" # expose backend to LAN
    environment:
      MINIO_ENDPOINT: "minio:9000"
      MINIO_PUBLIC_ENDPOINT: "localhost:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "minio123"
      QDRANT_HOST: "http://qdrant:6333"
      DATABASE_URL: "postgres://transcript_app:${POSTGRES_PASSWORD:-changeme_dev_only}@postgres:5432/transcript_security?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-dev_only_insecure_secret_change_me}"
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend/transcription-frontend
      dockerfile: Dockerfile
    container_name: transcript_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

  dagster:
    image: python:3.10-slim
    container_name: transcript_dagster
    restart: on-failure:5
    working_dir: /opt/dagster
    ports:
      - "3070:3000" 
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
    volumes:
      - ./dagster:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    networks:
      - app_network
    depends_on:
      - redis
      - qdrant
    command: >
      sh -c " pip install dagster dagster-webserver dagster-postgres redis requests && dagster dev -h 0.0.0.0 -p 3000 -f /opt/dagster/app/definitions.py "

networks:
  app_network:
    driver: bridge

volumes:
  minio_data:
  qdrant_data:
  dagster_home:
  postgres_data:
